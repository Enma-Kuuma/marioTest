<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu de Sélection des Jeux</title>
<style>
  /* Importation des polices */
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');

  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    background: #000;
    color: white;
    font-family: sans-serif;
    overflow: hidden;
  }

  /* Layout principal divisé en deux */
  .split {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: flex 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    cursor: pointer;
    text-decoration: none;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .split:hover {
    flex: 1.4;
    z-index: 10;
  }

  /* ---------------------------------
     STYLE : SUPER PIXEL ADVENTURE
  --------------------------------- */
  .pixel-game {
    background: #5c94fc; /* Bleu ciel Mario */
    border-right: 6px solid #000;
  }
  
  /* Le sol en herbe */
  .pixel-game::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 20%;
    background: #50b848;
    border-top: 8px solid #f8b830;
    z-index: 0;
  }

  /* Nuages animés en CSS */
  .cloud {
    position: absolute;
    background: #fff;
    border-radius: 50px;
    opacity: 0.8;
    animation: floatClouds linear infinite;
    z-index: 0;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
  }
  .c1 { width: 100px; height: 30px; top: 20%; left: -100px; animation-duration: 15s; }
  .c1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
  .c1::after { width: 40px; height: 40px; top: -15px; right: 15px; }

  .c2 { width: 80px; height: 25px; top: 40%; left: -100px; animation-duration: 22s; animation-delay: 5s; transform: scale(0.8); }
  .c2::before { width: 40px; height: 40px; top: -20px; left: 10px; }
  .c2::after { width: 30px; height: 30px; top: -10px; right: 10px; }

  @keyframes floatClouds {
    0% { left: -150px; }
    100% { left: 120%; }
  }

  .pixel-content {
    position: relative;
    z-index: 2;
    text-align: center;
    transition: transform 0.3s;
  }

  .pixel-game:hover .pixel-content {
    transform: translateY(-10px);
  }

  .pixel-game h1 {
    font-family: 'Press Start 2P', monospace;
    color: #f8d830;
    text-shadow: 4px 4px #c84040, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
    font-size: clamp(20px, 3vw, 40px);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .pixel-game p {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 1vw, 16px);
    text-shadow: 2px 2px #000;
    margin-bottom: 40px;
  }

  .pixel-btn {
    font-family: 'Press Start 2P', monospace;
    padding: 15px 30px;
    border: 4px solid #fff;
    background: #e84040;
    box-shadow: 0 6px #a02020;
    color: white;
    font-size: clamp(10px, 1vw, 16px);
    transition: all 0.1s;
    text-transform: uppercase;
  }

  .pixel-game:hover .pixel-btn {
    background: #f05050;
  }
  .pixel-btn:active {
    transform: translateY(6px);
    box-shadow: 0 0px #a02020;
  }

  /* ---------------------------------
     STYLE : CRIMSON KEEP
  --------------------------------- */
  .rogue-game {
    background: radial-gradient(circle at center, #2a0a14 0%, #050002 100%);
  }

  /* Particules de feu / braises */
  .ember {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #ff4444;
    border-radius: 50%;
    box-shadow: 0 0 10px #ff0000, 0 0 20px #ff8800;
    bottom: -10px;
    animation: rise infinite ease-in;
    opacity: 0;
    z-index: 0;
  }

  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
  }

  .rogue-content {
    position: relative;
    z-index: 2;
    text-align: center;
    transition: transform 0.4s;
  }

  .rogue-game:hover .rogue-content {
    transform: scale(1.05);
  }

  .rogue-game h1 {
    font-family: 'Cinzel', serif;
    color: #ff2222;
    text-shadow: 0 0 15px rgba(255,40,40,0.6), 2px 2px 5px #000;
    font-size: clamp(30px, 4.5vw, 60px);
    letter-spacing: 8px;
    margin-bottom: 20px;
  }

  .rogue-game p {
    font-family: 'Georgia', serif;
    color: #aa8888;
    letter-spacing: 4px;
    font-size: clamp(12px, 1.2vw, 20px);
    font-style: italic;
    margin-bottom: 50px;
  }
  
  .rogue-btn {
    font-family: 'Cinzel', serif;
    padding: 15px 40px;
    border: 1px solid #ff4444;
    color: #ff4444;
    background: rgba(255, 0, 0, 0.05);
    letter-spacing: 4px;
    font-weight: bold;
    font-size: clamp(12px, 1.2vw, 18px);
    transition: all 0.3s;
    box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.1);
  }

  .rogue-game:hover .rogue-btn {
    background: rgba(255, 68, 68, 0.2);
    color: #fff;
    border-color: #ff6666;
    box-shadow: 0 0 20px rgba(255,40,40,0.5), inset 0 0 15px rgba(255,0,0,0.5);
    text-shadow: 0 0 5px #fff;
  }

  /* Vignetage sombre */
  .rogue-game::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
    z-index: 1;
    pointer-events: none;
  }

  /* Responsive pour mobile */
  @media (max-width: 768px) {
    body { flex-direction: column; }
    .split { border-right: none; border-bottom: 4px solid #000; }
    .split:hover { flex: 1.1; }
  }
</style>
</head>
<body>

  <!-- JEU 1 : PIXEL ADVENTURE -->
  <a href="mario.html" class="split pixel-game">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    
    <div class="pixel-content">
      <h1>SUPER PIXEL<br>ADVENTURE</h1>
      <p>Plateforme Rétro</p>
      <div class="pixel-btn">JOUER</div>
    </div>
  </a>

  <!-- JEU 2 : CRIMSON KEEP -->
  <a href="crimson-keep.html" class="split rogue-game" id="rogue-container">
    <div class="rogue-content">
      <h1>CRIMSON KEEP</h1>
      <p>Hack & Slash Rogue-lite</p>
      <div class="rogue-btn">ENTRER DANS LE DONJON</div>
    </div>
  </a>

  <script>
    // Génération de braises pour le côté Crimson Keep
    const rogueContainer = document.getElementById('rogue-container');
    for(let i = 0; i < 25; i++) {
      let ember = document.createElement('div');
      ember.className = 'ember';
      ember.style.left = Math.random() * 100 + '%';
      ember.style.animationDuration = (Math.random() * 3 + 2) + 's';
      ember.style.animationDelay = (Math.random() * 2) + 's';
      rogueContainer.appendChild(ember);
    }
  </script>

</body>
</html>
