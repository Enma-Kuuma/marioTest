<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Pixel Adventure</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }
  #gameWrapper {
    position: relative;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #222;
    border-radius: 4px;
  }

  /* --- Overlay (start / game over / win screen) --- */
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.7);
    color: #fff;
    text-align: center;
    z-index: 10;
    padding: 20px;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: 18px; color: #f8d830;
    margin-bottom: 20px;
    text-shadow: 3px 3px #c84040;
    letter-spacing: 2px;
  }
  #overlay p {
    font-size: 9px; color: #ddd;
    margin-bottom: 8px; line-height: 1.8;
  }
  .start-btn {
    margin-top: 20px;
    padding: 12px 30px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    background: #e84040;
    color: #fff;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    text-shadow: 1px 1px #a02020;
    box-shadow: 0 4px #a02020;
    transition: all 0.1s;
  }
  .start-btn:hover { background: #f05050; }
  .start-btn:active { box-shadow: 0 1px #a02020; transform: translateY(3px); }

  /* --- Pause menu --- */
  #pause-menu {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0, 0, 0, 0.8);
    z-index: 99999;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Press Start 2P', monospace;
    backdrop-filter: blur(4px);
  }
  #pause-menu h1 {
    color: #f8d830;
    font-size: 40px;
    margin-bottom: 30px;
    text-shadow: 4px 4px #c84040;
  }
  #pause-menu button {
    padding: 15px 30px;
    font-size: 16px;
    cursor: pointer;
    color: #fff;
    border: 4px solid #fff;
    font-family: 'Press Start 2P', monospace;
    margin-bottom: 15px;
    transition: all 0.1s;
  }
  #pause-menu button:active { transform: translateY(2px); }
  #resume-btn { background: #50b848; }
  #resume-btn:hover { background: #60d058; }
  #menu-btn { background: #e84040; }
  #menu-btn:hover { background: #f05050; }

  /* --- Mobile controls --- */
  #mobileControls {
    display: none;
    position: absolute;
    bottom: 10px; left: 0; right: 0;
    z-index: 5;
    padding: 0 15px;
    justify-content: space-between;
    align-items: flex-end;
    pointer-events: none;
  }
  .ctrl-btn {
    pointer-events: all;
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 14px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .ctrl-btn:active { background: rgba(255,255,255,0.35); }
  .dpad { display: flex; gap: 8px; }
  .jump-area { display: flex; gap: 8px; }
  @media (pointer: coarse) {
    #mobileControls { display: flex; }
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <!-- Pause menu -->
  <div id="pause-menu">
    <h1>PAUSE</h1>
    <button id="resume-btn">Reprendre</button>
    <button id="menu-btn" onclick="window.location.href='index.html'">Menu Principal</button>
  </div>

  <canvas id="game"></canvas>

  <!-- Start / Game Over overlay -->
  <div id="overlay">
    <h1>SUPER PIXEL<br>ADVENTURE</h1>
    <p>← → or A/D to move</p>
    <p>SPACE or W to jump</p>
    <p>Collect coins, stomp enemies!</p>
    <button class="start-btn" id="startBtn">START GAME</button>
  </div>

  <!-- Mobile touch controls -->
  <div id="mobileControls">
    <div class="dpad">
      <button class="ctrl-btn" id="btnLeft">◀</button>
      <button class="ctrl-btn" id="btnRight">▶</button>
    </div>
    <div class="jump-area">
      <button class="ctrl-btn" id="btnJump">▲</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// SOUND ENGINE (Web Audio API — chiptune-style synthesized SFX)
// ============================================================
const SFX = (() => {
  let audioCtx = null;

  function ctx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function unlock() {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, duration, type, volume, delay) {
    type = type || 'square';
    volume = volume != null ? volume : 0.12;
    delay = delay || 0;
    const ac = ctx();
    const t = ac.currentTime + delay;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(t);
    osc.stop(t + duration);
  }

  function noise(duration, volume) {
    volume = volume != null ? volume : 0.08;
    const ac = ctx();
    const bufferSize = ac.sampleRate * duration;
    const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buffer;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(volume, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    src.connect(gain);
    gain.connect(ac.destination);
    src.start();
  }

  return {
    unlock: unlock,

    jump: function() {
      var ac = ctx();
      var osc = ac.createOscillator();
      var gain = ac.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(350, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, ac.currentTime + 0.12);
      gain.gain.setValueAtTime(0.10, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.15);
    },

    coin: function() {
      playTone(988, 0.06, 'square', 0.10);
      playTone(1319, 0.15, 'square', 0.10, 0.06);
    },

    stomp: function() {
      var ac = ctx();
      var osc = ac.createOscillator();
      var gain = ac.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(500, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(120, ac.currentTime + 0.08);
      osc.frequency.exponentialRampToValueAtTime(800, ac.currentTime + 0.15);
      gain.gain.setValueAtTime(0.12, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.18);
    },

    blockHit: function() {
      playTone(523, 0.04, 'square', 0.08);
      playTone(784, 0.08, 'square', 0.08, 0.04);
    },

    brickBreak: function() {
      noise(0.12, 0.10);
      playTone(200, 0.08, 'square', 0.06);
      playTone(130, 0.10, 'square', 0.05, 0.05);
    },

    death: function() {
      var notes = [660, 550, 440, 330, 220];
      for (var i = 0; i < notes.length; i++) {
        playTone(notes[i], 0.15, 'square', 0.10, i * 0.12);
      }
    },

    win: function() {
      var notes = [523, 659, 784, 1047, 1319, 1568];
      for (var i = 0; i < notes.length; i++) {
        playTone(notes[i], 0.18, 'square', 0.09, i * 0.08);
      }
    },

    fall: function() {
      var ac = ctx();
      var osc = ac.createOscillator();
      var gain = ac.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(600, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.5);
      gain.gain.setValueAtTime(0.10, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.5);
    },

    pause: function() {
      playTone(440, 0.06, 'square', 0.06);
      playTone(330, 0.08, 'square', 0.06, 0.06);
    },

    unpause: function() {
      playTone(330, 0.06, 'square', 0.06);
      playTone(440, 0.08, 'square', 0.06, 0.06);
    },

    menuClick: function() {
      playTone(660, 0.05, 'square', 0.08);
    }
  };
})();

// Unlock audio on first user interaction
['click', 'touchstart', 'keydown'].forEach(function(evt) {
  document.addEventListener(evt, SFX.unlock, { once: false, passive: true });
});


// ============================================================
// MUSIC ENGINE (chiptune sequencer — original platformer BGM)
// ============================================================
var MUSIC = (function() {
  var audioCtx = null;
  var masterGain = null;
  var playing = false;
  var paused = false;
  var timerID = null;
  var nextStepTime = 0;
  var currentStep = 0;

  // Tempo: 155 BPM, 8th notes
  var BPM = 155;
  var STEP_DUR = 60 / BPM / 2; // ~0.194s per 8th note

  // Note frequencies
  var N = {
    0:0,
    C3:131, D3:147, E3:165, F3:175, G3:196, A3:220, Bb3:233, B3:247,
    C4:262, D4:294, E4:330, F4:349, G4:392, A4:440, Bb4:466, B4:494,
    C5:523, D5:587, E5:659, F5:698, G5:784, A5:880, B5:988, C6:1047
  };

  // Original melody — 64 steps (8 bars), cheerful and bouncy
  // Section A (4 bars): ascending arpeggios + playful descents
  // Section B (4 bars): variation with higher register + resolution
  var melody = [
    // Bar 1
    N.G4, 0, N.C5, 0, N.E5, 0, N.G5, N.E5,
    // Bar 2
    N.F5, N.D5, N.B4, 0, N.C5, 0, 0, 0,
    // Bar 3
    N.A4, 0, N.C5, N.D5, N.E5, 0, N.D5, N.C5,
    // Bar 4
    N.B4, 0, N.D5, 0, N.G4, 0, 0, 0,
    // Bar 5
    N.E5, 0, N.E5, N.D5, N.C5, 0, N.A4, 0,
    // Bar 6
    N.G4, 0, N.A4, N.C5, N.D5, 0, 0, 0,
    // Bar 7
    N.C5, 0, N.E5, 0, N.G5, N.A5, N.G5, 0,
    // Bar 8
    N.E5, 0, N.C5, N.D5, N.C5, 0, 0, 0
  ];

  // Bass line — root notes, triangle wave feel
  var bass = [
    // Bar 1
    N.C3, 0, 0, N.C3, N.G3, 0, 0, N.G3,
    // Bar 2
    N.F3, 0, 0, N.F3, N.C3, 0, N.G3, 0,
    // Bar 3
    N.A3, 0, 0, N.A3, N.E3, 0, 0, N.E3,
    // Bar 4
    N.G3, 0, 0, N.G3, N.G3, 0, N.D3, 0,
    // Bar 5
    N.C3, 0, 0, N.C3, N.F3, 0, 0, N.F3,
    // Bar 6
    N.G3, 0, 0, N.G3, N.G3, 0, N.B3, 0,
    // Bar 7
    N.A3, 0, 0, N.A3, N.F3, 0, N.E3, 0,
    // Bar 8
    N.C3, 0, N.G3, 0, N.C3, 0, 0, 0
  ];

  // Harmony — fills in chord tones on off-beats
  var harmony = [
    // Bar 1
    0, N.E4, 0, N.G4, 0, N.C5, 0, 0,
    // Bar 2
    0, 0, N.G4, 0, 0, N.E4, 0, 0,
    // Bar 3
    0, N.C4, 0, 0, 0, N.A4, 0, 0,
    // Bar 4
    0, N.G4, 0, N.B4, 0, 0, 0, 0,
    // Bar 5
    0, N.C4, 0, 0, 0, N.E4, 0, N.C4,
    // Bar 6
    0, 0, N.E4, 0, 0, N.G4, 0, 0,
    // Bar 7
    0, N.A4, 0, N.C5, 0, 0, 0, N.E5,
    // Bar 8
    0, N.G4, 0, 0, 0, N.E4, 0, 0
  ];

  var TOTAL_STEPS = melody.length;

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (!masterGain) {
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.5;
      masterGain.connect(audioCtx.destination);
    }
    return audioCtx;
  }

  function scheduleNote(freq, time, dur, type, vol) {
    if (!freq || freq === 0) return;
    var ac = getCtx();
    var osc = ac.createOscillator();
    var gain = ac.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    // Staccato envelope
    var noteDur = dur * 0.7;
    gain.gain.setValueAtTime(vol || 0.06, time);
    gain.gain.setValueAtTime(vol || 0.06, time + noteDur * 0.8);
    gain.gain.exponentialRampToValueAtTime(0.001, time + noteDur);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + noteDur + 0.01);
  }

  function scheduleStep(step, time) {
    var s = step % TOTAL_STEPS;
    // Lead melody — square wave, slightly louder
    scheduleNote(melody[s], time, STEP_DUR, 'square', 0.07);
    // Bass — triangle wave
    scheduleNote(bass[s], time, STEP_DUR * 1.8, 'triangle', 0.09);
    // Harmony — quieter square wave, one octave effect
    scheduleNote(harmony[s], time, STEP_DUR, 'square', 0.035);
  }

  function scheduler() {
    if (!playing || paused) return;
    var ac = getCtx();
    // Schedule notes 100ms ahead for smooth playback
    while (nextStepTime < ac.currentTime + 0.1) {
      scheduleStep(currentStep, nextStepTime);
      nextStepTime += STEP_DUR;
      currentStep++;
    }
    timerID = setTimeout(scheduler, 25);
  }

  return {
    start: function() {
      var ac = getCtx();
      if (ac.state === 'suspended') ac.resume();
      playing = true;
      paused = false;
      currentStep = 0;
      nextStepTime = ac.currentTime + 0.1;
      scheduler();
    },

    stop: function() {
      playing = false;
      paused = false;
      if (timerID) { clearTimeout(timerID); timerID = null; }
    },

    pause: function() {
      if (!playing) return;
      paused = true;
      if (timerID) { clearTimeout(timerID); timerID = null; }
    },

    resume: function() {
      if (!playing || !paused) return;
      paused = false;
      var ac = getCtx();
      nextStepTime = ac.currentTime + 0.05;
      scheduler();
    },

    setVolume: function(v) {
      if (masterGain) masterGain.gain.value = v;
    }
  };
})();


// ============================================================
// CANVAS SETUP & RESPONSIVE SIZING
// ============================================================
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var overlay = document.getElementById('overlay');
var startBtn = document.getElementById('startBtn');

var GAME_W = 400;
var GAME_H = 240;
var TILE = 16;
var scale = 1;

function resize() {
  var maxW = window.innerWidth - 16;
  var maxH = window.innerHeight - 16;
  scale = Math.min(Math.floor(maxW / GAME_W), Math.floor(maxH / GAME_H));
  if (scale < 1) scale = 1;
  canvas.width = GAME_W;
  canvas.height = GAME_H;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  var wrapper = document.getElementById('gameWrapper');
  wrapper.style.width = GAME_W * scale + 'px';
  wrapper.style.height = GAME_H * scale + 'px';
}
window.addEventListener('resize', resize);
resize();


// ============================================================
// DRAWING HELPERS
// ============================================================
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}


// ============================================================
// COLOR PALETTE
// ============================================================
var PAL = {
  // Mario
  skin: '#ffc8a0', skinS: '#e09860', skinHi: '#ffe0c0',
  hat: '#e02020', hatS: '#a01818', hatHi: '#f85050',
  hair: '#402010',
  overalls: '#2848d8', overallsS: '#1830a0', overallsHi: '#4868f0',
  shirt: '#28a028', shirtS: '#187018', shirtHi: '#48c848',
  shoes: '#c83818', shoesS: '#882010', shoesHi: '#e86040',
  white: '#ffffff', eye: '#000000', eyeWhite: '#ffffff',
  button: '#f8d830', buttonS: '#c0a018',
  glove: '#ffffff',
  // Enemies
  goombaBody: '#c07038', goombaBodyS: '#884820', goombaBodyHi: '#d89858',
  goombaFoot: '#201008', goombaFace: '#f8d8b0', goombaFrown: '#402010',
  goombaBrow: '#000000',
  // Items
  coinGold: '#f8d830', coinDark: '#c8a018', coinShine: '#fff8b0',
  blockYellow: '#f8b830', blockDark: '#b07818', blockLight: '#f8d870',
  // Environment
  sky: '#5c94fc', groundTop: '#50b848', groundDirt: '#c07030', groundDark: '#984818',
  bushGreen: '#30a038', bushLight: '#58c860',
  pipeGreen: '#30a030', pipeLight: '#58c858', pipeDark: '#1a701a',
  brickColor: '#c06020', brickLine: '#8a4018', brickHi: '#d88050',
  cloudWhite: '#f8f8f8', cloudGray: '#d0d8e8',
  hillGreen: '#48a840', hillLight: '#68c860',
  flagPole: '#888', flagGreen: '#30a030'
};


// ============================================================
// SPRITE DRAWING — Mario (16px wide, pixel-by-pixel)
// ============================================================
var MARIO_W = 16;

function drawMario(x, y, dir, frame) {
  var f = Math.floor(frame) % 4;
  x = Math.round(x); y = Math.round(y);
  var flip = dir === -1;
  var p = function(ix, iy, c) {
    var fx = flip ? (MARIO_W - 1 - ix) : ix;
    ctx.fillStyle = c;
    ctx.fillRect(x + fx, y + iy, 1, 1);
  };

  // Hat
  for (var i = 4; i <= 10; i++) p(i, 0, PAL.hat);
  for (var i = 3; i <= 11; i++) p(i, 1, PAL.hat);
  for (var i = 3; i <= 12; i++) p(i, 2, PAL.hat);
  for (var i = 2; i <= 13; i++) p(i, 3, PAL.hatS);
  p(4, 0, PAL.hatHi); p(5, 0, PAL.hatHi);

  // Face
  for (var i = 3; i <= 11; i++) p(i, 4, PAL.skin);
  p(2, 4, PAL.hair); p(12, 4, PAL.skin);
  for (var i = 2; i <= 12; i++) p(i, 5, PAL.skin);
  p(1, 5, PAL.hair); p(2, 5, PAL.hair);
  p(5, 5, PAL.eyeWhite); p(6, 5, PAL.eyeWhite);
  p(9, 5, PAL.eyeWhite); p(10, 5, PAL.eyeWhite);
  p(6, 5, PAL.eye); p(10, 5, PAL.eye);
  for (var i = 2; i <= 12; i++) p(i, 6, PAL.skin);
  p(7, 6, PAL.skinS); p(8, 6, PAL.skinS);
  p(1, 6, PAL.hair);
  for (var i = 3; i <= 11; i++) p(i, 7, PAL.skin);
  p(5, 7, PAL.skinS); p(6, 7, PAL.skinS); p(7, 7, PAL.skinS); p(8, 7, PAL.skinS); p(9, 7, PAL.skinS);
  p(2, 7, PAL.hair); p(1, 7, PAL.hair);

  // Shirt
  for (var i = 3; i <= 12; i++) p(i, 8, PAL.shirt);
  p(2, 8, PAL.shirt); p(13, 8, PAL.shirt);
  for (var i = 2; i <= 13; i++) p(i, 9, PAL.shirt);
  p(1, 9, PAL.glove); p(0, 10, PAL.glove); p(1, 10, PAL.glove);
  p(14, 9, PAL.glove); p(14, 10, PAL.glove); p(15, 10, PAL.glove);
  p(1, 8, PAL.shirt); p(14, 8, PAL.shirt);

  // Overalls
  for (var i = 3; i <= 12; i++) p(i, 10, PAL.overalls);
  p(2, 10, PAL.overalls); p(13, 10, PAL.overalls);
  for (var i = 3; i <= 12; i++) p(i, 11, PAL.overalls);
  p(2, 11, PAL.overalls); p(13, 11, PAL.overalls);
  p(5, 9, PAL.overalls); p(6, 9, PAL.overalls);
  p(9, 9, PAL.overalls); p(10, 9, PAL.overalls);
  p(5, 10, PAL.button); p(10, 10, PAL.button);
  for (var i = 3; i <= 12; i++) p(i, 12, PAL.overalls);
  p(2, 12, PAL.overalls); p(13, 12, PAL.overalls);
  for (var i = 3; i <= 12; i++) p(i, 13, PAL.overalls);

  // Legs (4-frame walk cycle)
  if (f === 0) {
    for (var i = 3; i <= 6; i++) { p(i, 14, PAL.overalls); p(i, 15, PAL.overalls); }
    for (var i = 9; i <= 12; i++) { p(i, 14, PAL.overalls); p(i, 15, PAL.overalls); }
    for (var i = 2; i <= 6; i++) p(i, 16, PAL.shoes);
    for (var i = 9; i <= 13; i++) p(i, 16, PAL.shoes);
    for (var i = 2; i <= 6; i++) p(i, 17, PAL.shoes);
    for (var i = 9; i <= 13; i++) p(i, 17, PAL.shoes);
  } else if (f === 1) {
    for (var i = 2; i <= 5; i++) { p(i, 14, PAL.overalls); p(i, 15, PAL.overalls); }

// ============================================================
// LEVEL GENERATION
// ============================================================
// Tile legend: 0=air, 1=ground, 2=brick, 3=question, 4=pipe(2h), 5=pipe(3h), 6=coin, 8=flag
var LEVEL_W = 120;
var LEVEL_H = 15;
var level = [];
var flagPos = null; // Stored to avoid scanning entire level each frame

function generateLevel() {
  level = [];
  flagPos = null;

  for (var y = 0; y < LEVEL_H; y++) {
    level[y] = [];
    for (var x = 0; x < LEVEL_W; x++) {
      level[y][x] = (y >= 13) ? 1 : 0;
    }
  }

  // Gaps
  var gaps = [[18, 20], [46, 48], [72, 73], [98, 100]];
  gaps.forEach(function(g) {
    for (var gx = g[0]; gx <= g[1]; gx++) {
      level[13][gx] = 0;
      level[14][gx] = 0;
    }
  });

  // Question blocks
  [8, 12, 13, 14, 30, 55, 60, 78, 85, 105].forEach(function(bx) { level[9][bx] = 3; });

  // Brick blocks
  [[11,9],[15,9],[25,9],[26,9],[27,9],[28,9],[40,7],[41,7],[42,7],
   [50,9],[51,9],[52,9],[53,9],[65,9],[66,9],[67,9],[80,9],[81,9],
   [90,7],[91,7],[92,7],[93,7],[94,7]].forEach(function(b) { level[b[1]][b[0]] = 2; });

  // Floating coins
  [[9,6],[13,6],[31,6],[41,4],[56,6],[61,6],[79,6],[86,6],[106,6]].forEach(function(c) { level[c[1]][c[0]] = 6; });

  // Pipes
  level[11][22] = 4; level[12][22] = 4;
  level[10][36] = 5; level[11][36] = 5; level[12][36] = 5;
  level[11][62] = 4; level[12][62] = 4;
  level[10][88] = 5; level[11][88] = 5; level[12][88] = 5;

  // Staircase near flag
  for (var s = 0; s < 8; s++) {
    for (var sy = 12 - s; sy <= 12; sy++) {
      level[sy][108 + s] = 2;
    }
  }

  // Flag — store position for efficient collision
  level[4][117] = 8;
  flagPos = { tx: 117, ty: 4 };
}

var keys = {};

document.addEventListener('keyup', function(e) { keys[e.code] = false; });

function isLeft() { return keys['ArrowLeft'] || keys['KeyA'] || mobileKeys.left; }
function isRight() { return keys['ArrowRight'] || keys['KeyD'] || mobileKeys.right; }
function isJump() { return keys['Space'] || keys['KeyW'] || keys['ArrowUp'] || mobileKeys.jump; }


// ============================================================
// COLLISION
// ============================================================
function getTile(tx, ty) {
  if (tx < 0 || tx >= LEVEL_W || ty < 0 || ty >= LEVEL_H) return 0;
  return level[ty][tx];
}

function isSolid(tx, ty) {
  var t = getTile(tx, ty);
  return t === 1 || t === 2 || t === 3 || t === 4 || t === 5;
}

function collidesWithLevel(x, y, w, h) {
  var l = Math.floor(x / TILE);
  var r = Math.floor((x + w - 1) / TILE);
  var t = Math.floor(y / TILE);
  var b = Math.floor((y + h - 1) / TILE);
  for (var ty = t; ty <= b; ty++) {
    for (var tx = l; tx <= r; tx++) {
      if (isSolid(tx, ty)) return true;
    }
  }
  return false;
}

function hitBlock(tx, ty) {
  var t = getTile(tx, ty);
  if (t === 3 && !qBlocksUsed[tx + ',' + ty]) {
    qBlocksUsed[tx + ',' + ty] = true;
    score += 100;
    SFX.blockHit();
    particles.push({ x: tx * TILE + 4, y: ty * TILE - TILE, vy: -3, life: 30, type: 'coin' });
  }
  if (t === 2) {
    level[ty][tx] = 0;
    SFX.brickBreak();
    for (var i = 0; i < 4; i++) {
      particles.push({
        x: tx * TILE + (i % 2) * 8, y: ty * TILE + Math.floor(i / 2) * 8,
        vx: (i % 2 === 0 ? -1 : 1) * (1 + Math.random()), vy: -3 - Math.random() * 2,
        life: 40, type: 'brick'
      });
    }
  }
}


// ============================================================
// UPDATE (called at fixed 60fps)
// ============================================================
function update() {
  animFrame++;

  if (gameState === 'dead') {
    deathTimer++;
    player.vy += 0.3;
    player.y += player.vy;
    if (deathTimer > 90) {
      lives--;
      if (lives <= 0) {
        gameState = 'menu';
        overlay.classList.remove('hidden');
        document.querySelector('#overlay h1').textContent = 'GAME OVER';
        startBtn.textContent = 'TRY AGAIN';
      } else {
        initGame();
        gameState = 'playing';
        overlay.classList.add('hidden');
        MUSIC.start();
      }
    }
    return;
  }

  if (gameState === 'win') {
    winTimer++;
    if (winTimer > 120) {
      gameState = 'menu';
      overlay.classList.remove('hidden');
      document.querySelector('#overlay h1').textContent = 'YOU WIN!';
      document.querySelector('#overlay p').textContent = 'Score: ' + score;
      startBtn.textContent = 'PLAY AGAIN';
    }
    return;
  }

  if (gameState !== 'playing') return;

  var p = player;
  var accel = 0.15;
  var friction = 0.93;
  var maxSpeed = 1.7;
  var gravity = 0.25;
  var jumpForce = -7.0;

  // Horizontal movement
  if (isLeft()) { p.vx -= accel; p.dir = -1; }
  if (isRight()) { p.vx += accel; p.dir = 1; }
  p.vx *= friction;
  if (Math.abs(p.vx) > maxSpeed) p.vx = maxSpeed * Math.sign(p.vx);
  if (Math.abs(p.vx) < 0.1) p.vx = 0;

  var nx = p.x + p.vx;
  if (!collidesWithLevel(nx, p.y, p.w, p.h)) {
    p.x = nx;
  } else {
    while (!collidesWithLevel(p.x + Math.sign(p.vx), p.y, p.w, p.h)) {
      p.x += Math.sign(p.vx);
    }
    p.vx = 0;
  }

  // Jump & gravity
  if (isJump() && p.onGround) {
    p.vy = jumpForce;
    p.onGround = false;
    SFX.jump();
  }
  p.vy += gravity;
  if (p.vy > 6) p.vy = 6;

  var ny = p.y + p.vy;
  if (!collidesWithLevel(p.x, ny, p.w, p.h)) {
    p.y = ny;
    p.onGround = false;
  } else {
    if (p.vy > 0) {
      while (!collidesWithLevel(p.x, p.y + 1, p.w, p.h)) p.y++;
      p.onGround = true;
    } else {
      while (!collidesWithLevel(p.x, p.y - 1, p.w, p.h)) p.y--;
      var headTx1 = Math.floor(p.x / TILE);
      var headTx2 = Math.floor((p.x + p.w - 1) / TILE);
      var headTy = Math.floor((p.y - 1) / TILE);
      hitBlock(headTx1, headTy);
      hitBlock(headTx2, headTy);
    }
    p.vy = 0;
  }

  // Walk animation
  if (Math.abs(p.vx) > 0.3 && p.onGround) {
    p.walkFrame += Math.abs(p.vx) * 0.15;
  } else {
    p.walkFrame = 0;
  }

  if (p.invincible > 0) p.invincible--;

  // Fall death
  if (p.y > LEVEL_H * TILE + 32) {
    gameState = 'dead';
    p.vy = -5;
    deathTimer = 0;
    SFX.fall();
    MUSIC.stop();
  }

  // Coins
  coins.forEach(function(c) {
    if (c.collected) return;
    c.frame++;
    if (p.x + p.w > c.x && p.x < c.x + 12 && p.y + p.h > c.y && p.y < c.y + 16) {
      c.collected = true;
      score += 200;
      SFX.coin();
      particles.push({ x: c.x, y: c.y, vy: -2, life: 20, type: 'score', text: '200' });
    }
  });

  // Enemies
  enemies.forEach(function(e) {
    if (!e.alive) {
      if (e.squishTimer > 0) e.squishTimer--;
      return;
    }
    e.frame += 0.04;

    e.vy += 0.35;
    if (e.vy > 6) e.vy = 6;

    var eW = 14, eH = 12;
    var enx = e.x + e.vx;
    if (collidesWithLevel(enx, e.y, eW, eH)) {
      e.vx *= -1;
      enx = e.x;
    }
    e.x = enx;

    var eny = e.y + e.vy;
    if (collidesWithLevel(e.x, eny, eW, eH)) {
      if (e.vy > 0) {
        while (!collidesWithLevel(e.x, e.y + 1, eW, eH)) e.y++;
        e.onGround = true;
      }
      e.vy = 0;
      eny = e.y;
    } else {
      e.y = eny;
      e.onGround = false;
    }

    if (e.y > LEVEL_H * TILE + 48) {
      e.alive = false;
      return;
    }

    if (p.invincible <= 0) {
      if (p.x + p.w > e.x + 1 && p.x < e.x + eW - 1 && p.y + p.h > e.y + 1 && p.y < e.y + eH) {
        if (p.vy > 0 && p.y + p.h - e.y < 10) {
          e.alive = false;
          e.squishTimer = 30;
          p.vy = -4;
          score += 100;
          SFX.stomp();
          particles.push({ x: e.x + 4, y: e.y, vy: -2, life: 20, type: 'score', text: '100' });
        } else {
          gameState = 'dead';
          p.vy = -5;
          deathTimer = 0;
          SFX.death();
          MUSIC.stop();
        }
      }
    }
  });

  // Flag check (using stored position)
  if (flagPos) {
    var fx = flagPos.tx * TILE;
    var fy = flagPos.ty * TILE;
    if (p.x + p.w > fx && p.x < fx + TILE && p.y + p.h > fy) {
      gameState = 'win';
      winTimer = 0;
      score += 1000;
      SFX.win();
      MUSIC.stop();
    }
  }

  // Particles
  particles.forEach(function(pt) {
    pt.life--;
    pt.y += (pt.vy || 0);
    pt.x += (pt.vx || 0);
    if (pt.type === 'brick' || pt.type === 'coin') pt.vy += 0.2;
  });
  particles = particles.filter(function(pt) { return pt.life > 0; });

  // Camera
  camera.x = p.x - GAME_W / 3;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > LEVEL_W * TILE - GAME_W) camera.x = LEVEL_W * TILE - GAME_W;
}


// ============================================================
// RENDER
// ============================================================
function render() {
  var cx = Math.round(camera.x);

  // Sky gradient
  var grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, '#5c94fc');
  grad.addColorStop(1, '#94c4fc');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Background clouds (parallax)
  [[50,30],[200,20],[400,35],[600,25],[850,30],[1100,20],[1400,35],[1650,28]].forEach(function(c) {
    drawCloud(c[0] - cx * 0.3, c[1]);
  });

  // Background hills
  [[80,3],[300,2],[550,3],[800,2],[1050,3],[1350,2],[1600,3]].forEach(function(h) {
    drawHill(h[0] - cx * 0.5, 13 * TILE - TILE, h[1]);
  });

  // Tiles
  for (var y = 0; y < LEVEL_H; y++) {
    for (var x = 0; x < LEVEL_W; x++) {
      var sx = x * TILE - cx;
      var sy = y * TILE;
      if (sx < -TILE || sx > GAME_W + TILE) continue;

      var t = level[y][x];
      if (t === 1) {
        if (y === 13) {
          drawPixelRect(sx, sy, TILE, 4, PAL.groundTop);
          drawPixelRect(sx, sy + 4, TILE, TILE - 4, PAL.groundDirt);
          if ((x * 7 + y) % 3 === 0) {
            drawPixelRect(sx + 3, sy - 2, 2, 3, PAL.bushGreen);
            drawPixelRect(sx + 10, sy - 1, 2, 2, PAL.bushLight);
          }
        } else {
          drawPixelRect(sx, sy, TILE, TILE, PAL.groundDirt);
          drawPixelRect(sx, sy, TILE, 1, PAL.groundDark);
        }
      } else if (t === 2) {
        drawBrick(sx, sy);
      } else if (t === 3) {
        drawQuestionBlock(sx, sy, !!qBlocksUsed[x + ',' + y], animFrame);
      } else if (t === 4) {
        if (level[y - 1] && level[y - 1][x] !== 4 && level[y - 1][x] !== 5) {
          drawPipe(sx, sy, 1);
        }
      } else if (t === 5) {
        if (level[y - 1] && level[y - 1][x] !== 5) {
          var cnt = 1;
          var cy = y + 1;
          while (cy < LEVEL_H && level[cy][x] === 5) { cnt++; cy++; }
          drawPipe(sx, sy, cnt);
        }
      } else if (t === 8) {
        drawFlag(sx, sy);
      }
    }
  }

  // Coins
  coins.forEach(function(c) {
    if (c.collected) return;
    drawCoin(c.x - cx, c.y, c.frame);
  });

  // Enemies
  enemies.forEach(function(e) {
    if (e.squishTimer > 0) {
      drawGoombaSquished(e.x - cx, e.y + 9);
      return;
    }
    if (!e.alive) return;
    drawGoomba(e.x - cx, e.y, e.frame);
  });

  // Player
  var p = player;
  if (gameState === 'dead') {
    if (animFrame % 4 < 2) drawMarioJump(p.x - cx, p.y, p.dir);
  } else if (p.invincible > 0 && animFrame % 4 < 2) {
    // Invincible flicker — skip drawing
  } else if (!p.onGround) {
    drawMarioJump(p.x - cx, p.y, p.dir);
  } else {
    drawMario(p.x - cx, p.y, p.dir, p.walkFrame);
  }

  // Particles
  particles.forEach(function(pt) {
    if (pt.type === 'coin') {
      drawCoin(pt.x - cx, pt.y, animFrame);
    } else if (pt.type === 'brick') {
      drawPixelRect(pt.x - cx, pt.y, 6, 6, PAL.brickColor);
      drawPixelRect(pt.x - cx + 1, pt.y + 1, 4, 4, PAL.brickHi);
    } else if (pt.type === 'score') {
      ctx.fillStyle = '#fff';
      ctx.font = '7px "Press Start 2P"';
      ctx.fillText(pt.text, pt.x - cx, pt.y);
    }
  });

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = '8px "Press Start 2P"';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  ctx.fillText('SCORE', 10, 14);
  ctx.fillText(String(score).padStart(6, '0'), 10, 26);
  ctx.fillText('LIVES', GAME_W - 80, 14);
  ctx.fillText('x ' + lives, GAME_W - 80, 26);
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, GAME_H / 2 - 20, GAME_W, 40);
    ctx.fillStyle = '#f8d830';
    ctx.font = '12px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL CLEAR!', GAME_W / 2, GAME_H / 2 + 5);
    ctx.textAlign = 'left';
  }
}


// ============================================================
// GAME LOOP (fixed 60fps timestep)
// ============================================================
var FIXED_DT = 1000 / 60;
var lastTime = 0;
var accumulator = 0;

function loop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  var elapsed = timestamp - lastTime;
  lastTime = timestamp;

  // Cap to prevent spiral of death after tab switch
  if (elapsed > 200) elapsed = 200;

  accumulator += elapsed;

  while (accumulator >= FIXED_DT) {
    update();
    accumulator -= FIXED_DT;
  }

  render();
  requestAnimationFrame(loop);
}


// ============================================================
// GAME START / MENU
// ============================================================
function startGame() {
  initGame();
  gameState = 'playing';
  overlay.classList.add('hidden');
  SFX.menuClick();
  MUSIC.start();
}

startBtn.addEventListener('click', startGame);

document.addEventListener('keydown', function(e) {
  if (gameState === 'menu' && (e.code === 'Enter' || e.code === 'Space')) {
    startGame();
  }
});


// ============================================================
// PAUSE SYSTEM
// ============================================================
(function() {
  window.isGamePaused = false;
  var pauseMenu = document.getElementById('pause-menu');
  var resumeBtn = document.getElementById('resume-btn');

  var originalRAF = window.requestAnimationFrame;
  var pausedCallback = null;

  window.requestAnimationFrame = function(callback) {
    if (window.isGamePaused) {
      pausedCallback = callback;
      return -1;
    }
    return originalRAF(callback);
  };

  function togglePause() {
    if (gameState !== 'playing' && !window.isGamePaused) return;

    window.isGamePaused = !window.isGamePaused;
    pauseMenu.style.display = window.isGamePaused ? 'flex' : 'none';

    if (window.isGamePaused) {
      SFX.pause();
      MUSIC.pause();
    } else {
      SFX.unpause();
      MUSIC.resume();
      lastTime = 0;
      accumulator = 0;
      if (pausedCallback) {
        originalRAF(pausedCallback);
        pausedCallback = null;
      }
    }
  }

  window.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') togglePause();
  });
  resumeBtn.addEventListener('click', togglePause);
})();


// ============================================================
// INIT & RUN
// ============================================================
initGame();
requestAnimationFrame(loop);
</script>
